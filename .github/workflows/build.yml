name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK (artifact, zip'li)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to Release (zip'siz, ham dosya)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Browsy (en güncel build)
          body: "Otomatik build -- her main'e push'ta güncellenir. APK dosyasını doğrudan indirip kurabilirsin, zip içinden çıkarmana gerek yok."
          files: app/build/outputs/apk/debug/app-debug.apk